<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>测试站点</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🚀 测试站点</h1>
      <p class="subtitle">Test Website · 部署成功 🎉</p>
    </header>
    <main>
      <div class="card">
        <h2>状态</h2>
        <div class="status-row">
          <span class="label">服务器</span>
          <span class="value online">🟢 在线</span>
        </div>
        <div class="status-row">
          <span class="label">响应时间</span>
          <span class="value" id="latency">检测中...</span>
        </div>
        <div class="status-row">
          <span class="label">当前时间</span>
          <span class="value" id="time">--</span>
        </div>
      </div>
      <div class="card">
        <h2>关于</h2>
        <p>这是一个通过 Cloudflare Pages 部署的静态测试页面，用于验证网站能否正常从公网访问。</p>
        <p>如果你看到这个页面，说明部署成功了！</p>
      </div>
    </main>
    <footer>
      <p>Powered by Cloudflare Pages</p>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
